name: Build Windows x86 and x64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            python-version: '3.11'
            pyinstaller-arch: x64
            suffix: x64
          - arch: x86
            python-version: '3.11-32'
            pyinstaller-arch: x86
            suffix: x86

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.pyinstaller-arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --icon=favicon.ico --noconfirm --onefile --windowed --collect-all customtkinter otp_gui.py

      - name: Rename executable
        shell: pwsh
        run: |
          Rename-Item "dist/otp_gui.exe" "OTPAuthenticator_${{ matrix.suffix }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OTPAuthenticator-${{ matrix.suffix }}
          path: dist/OTPAuthenticator_${{ matrix.suffix }}.exe
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: OTPAuthenticator-x64
          path: dist/

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: OTPAuthenticator-x86
          path: dist/

      - name: List files
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/OTPAuthenticator_x64.exe
            dist/OTPAuthenticator_x86.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
