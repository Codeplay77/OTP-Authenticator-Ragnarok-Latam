name: Build Windows x86 and x64

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-x64:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --icon=favicon.ico --noconfirm --onefile --windowed --collect-all customtkinter otp_gui.py

      - name: Rename executable
        shell: pwsh
        run: |
          Rename-Item "dist/otp_gui.exe" "OTPAuthenticator_x64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OTPAuthenticator-x64
          path: dist/OTPAuthenticator_x64.exe
          retention-days: 90

  build-x86:
    name: Build Windows x86
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11 (x86)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --icon=favicon.ico --noconfirm --onefile --windowed --collect-all customtkinter otp_gui.py

      - name: Rename executable
        shell: pwsh
        run: |
          Rename-Item "dist/otp_gui.exe" "OTPAuthenticator_x86.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OTPAuthenticator-x86
          path: dist/OTPAuthenticator_x86.exe
          retention-days: 90

  release:
    name: Create Release
    needs: [build-x64, build-x86]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: OTPAuthenticator-x64
          path: dist/

      - name: Download x86 artifact
        uses: actions/download-artifact@v4
        with:
          name: OTPAuthenticator-x86
          path: dist/

      - name: List files
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/OTPAuthenticator_x64.exe
            dist/OTPAuthenticator_x86.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
